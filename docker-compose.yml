services:
  redis:
    image: redis:7-alpine
    container_name: vyezdnik-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - vyezdnik-net

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: vyezdnik-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    networks:
      - vyezdnik-net

  backend:
    build: ./backend
    container_name: vyezdnik-backend
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    networks:
      - vyezdnik-net

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: vyezdnik-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      - backend
      - blackbox
      - qdrant
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - vyezdnik-net

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: vyezdnik-blackbox
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/config/blackbox.yml:ro
    command:
      - --config.file=/config/blackbox.yml
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - vyezdnik-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: vyezdnik-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - vyezdnik-net

  frontend:
    build: ./frontend
    container_name: vyezdnik-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    networks:
      - vyezdnik-net

networks:
  vyezdnik-net:
    driver: bridge

volumes:
  qdrant_storage:
  hf_cache:
  frontend_node_modules:
  grafana_data:
