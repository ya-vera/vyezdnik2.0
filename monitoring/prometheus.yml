global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vyezdnik-backend
    metrics_path: /metrics
    scrape_timeout: 15s
    static_configs:
      - targets: ["backend:8000"]

  - job_name: qdrant
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["qdrant:6333"]

  # Synthetic probe: HTTP 200 from backend /health (via Blackbox)
  - job_name: blackbox-backend-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:8000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
