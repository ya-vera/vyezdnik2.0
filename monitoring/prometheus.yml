global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Сам Prometheus — чтобы в Graph было хотя бы job="prometheus" и метрика up
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vyezdnik-backend
    metrics_path: /metrics
    scrape_timeout: 10s
    static_configs:
      - targets: ["backend:8000"]
